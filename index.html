<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý phòng trọ</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: "Times New Roman"; }

#loginBox {
    width: 300px;
    margin: 100px auto;
    text-align: center;
    border: 1px solid black;
    padding: 20px;
}

.container { width: 1000px; margin: auto; display:none; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid black; padding: 6px; text-align: center; }

input { padding: 5px; margin: 3px; }
button { padding: 5px 10px; margin: 3px; cursor: pointer; }

/* IN A4 */
@media print {
    @page { size: A4; margin: 20mm; }
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: absolute; top: 0; left: 0; width: 100%; }
    button { display:none; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Đăng nhập</h2>
<input id="user" placeholder="Tài khoản"><br>
<input id="pass" type="password" placeholder="Mật khẩu"><br>
<button onclick="login()">Đăng nhập</button>
</div>

<!-- APP -->
<div class="container" id="app">

<h1>NHÀ TRỌ THIÊN AN</h1>
<button onclick="logout()">Đăng xuất</button>

<div>
<input id="phong" placeholder="Phòng">
<input id="tuNgay" type="date">
<input id="denNgay" type="date"><br>

<input id="dienCu" placeholder="Điện cũ">
<input id="dienMoi" placeholder="Điện mới">

<input id="nuocCu" placeholder="Nước cũ">
<input id="nuocMoi" placeholder="Nước mới"><br>

Đơn giá điện: <input id="giaDien" value="3800">
Đơn giá nước: <input id="giaNuoc" value="30000"><br>

<button onclick="addRoom()">Thêm</button>
<button onclick="undoDelete()">Hoàn tác</button>
<button onclick="viewAllRooms()">Xem tất cả</button>
</div>

<!-- BẢNG -->
<table>
<tr>
<th>Phòng</th>
<th>Thời gian</th>
<th>Điện cũ</th>
<th>Điện mới</th>
<th>Nước cũ</th>
<th>Nước mới</th>
<th>Hành động</th>
</tr>
<tbody id="roomList"></tbody>
</table>

<hr>

<!-- PHIẾU -->
<div id="printArea">
<h2 style="text-align:center;">Bảng Chốt Số Điện Nước</h2>

<div>
Phòng: <span id="viewPhong"></span><br>
Từ ngày: <span id="viewTu"></span> → Đến ngày: <span id="viewDen"></span>
</div>

<table id="billTable"></table>

<br><br>

<table style="border:none;">
<tr>
<td style="border:none; text-align:center;">Người thu<br><br>(Ký tên)</td>
<td style="border:none; text-align:center;">Người nộp<br><br>(Ký tên)</td>
</tr>
</table>

</div>

<button onclick="printPhieu()">🖨️ In</button>
<button onclick="exportExcel()">📊 Excel</button>

</div>

<script>
const USERNAME="admin", PASSWORD="26082004";

let rooms=[], lastDeleted=null;

// LOGIN
function login(){
if(user.value===USERNAME && pass.value===PASSWORD){
localStorage.setItem("loggedIn","true");
showApp();
}else alert("Sai!");
}
function showApp(){ loginBox.style.display="none"; app.style.display="block"; }
function logout(){ localStorage.removeItem("loggedIn"); location.reload(); }

// FORMAT
function formatDate(d){
if(!d)return "";
let x=new Date(d);
return `${String(x.getDate()).padStart(2,'0')}/${String(x.getMonth()+1).padStart(2,'0')}/${x.getFullYear()}`;
}
function money(n){return n.toLocaleString('vi-VN');}

// STORAGE
function save(){localStorage.setItem("rooms",JSON.stringify(rooms));}
function load(){let d=localStorage.getItem("rooms"); if(d){rooms=JSON.parse(d); render();}}

// DATA
function getData(){
return {
phong:phong.value,
tuNgay:tuNgay.value,
denNgay:denNgay.value,
dienCu:+dienCu.value,
dienMoi:+dienMoi.value,
nuocCu:+nuocCu.value,
nuocMoi:+nuocMoi.value
}}

// RENDER
function render(){
roomList.innerHTML = rooms.map((r,i)=>`
<tr>
<td contenteditable onblur="editCell(${i},'phong',this.innerText)">${r.phong}</td>

<td>
<input type="date" value="${r.tuNgay}" onchange="editCell(${i},'tuNgay',this.value)">
<br>
<input type="date" value="${r.denNgay}" onchange="editCell(${i},'denNgay',this.value)">
</td>

<td contenteditable onblur="editCell(${i},'dienCu',this.innerText)">${r.dienCu}</td>
<td contenteditable onblur="editCell(${i},'dienMoi',this.innerText)">${r.dienMoi}</td>

<td contenteditable onblur="editCell(${i},'nuocCu',this.innerText)">${r.nuocCu}</td>
<td contenteditable onblur="editCell(${i},'nuocMoi',this.innerText)">${r.nuocMoi}</td>

<td>
<button onclick="selectRoom(${i})">Xem</button>
<button onclick="deleteRoom(${i})">Xoá</button>
</td>
</tr>
`).join("");
}

// EDIT
function editCell(i,field,value){
if(field.includes("dien")||field.includes("nuoc")) value=Number(value);
rooms[i][field]=value;
save();
render();
}

// CRUD
function addRoom(){rooms.push(getData()); save(); render();}
function deleteRoom(i){
if(!confirm("Xoá?")) return;
lastDeleted={data:rooms[i],index:i};
rooms.splice(i,1);
save(); render();
}
function undoDelete(){
if(!lastDeleted) return;
rooms.splice(lastDeleted.index,0,lastDeleted.data);
save(); render();
lastDeleted=null;
}

// XEM 1 PHÒNG
function selectRoom(i){
let r=rooms[i],gd=+giaDien.value,gn=+giaNuoc.value;

let td=r.dienMoi-r.dienCu;
let tn=r.nuocMoi-r.nuocCu;

let tienD=td*gd;
let tienN=tn*gn;

billTable.innerHTML=`
<tr>
<th>Phòng</th><th>Nội dung</th><th>Số cũ</th><th>Số mới</th><th>Tổng</th><th>Đơn giá</th><th>Thành tiền</th>
</tr>

<tr>
<td colspan="7" style="background:#d0d0d0; font-weight:bold; text-align:left;">
PHÒNG ${r.phong} (${formatDate(r.tuNgay)} → ${formatDate(r.denNgay)})
</td>
</tr>

<tr>
<td>${r.phong}</td><td>Tiền điện</td>
<td>${r.dienCu}</td><td>${r.dienMoi}</td>
<td>${td}</td><td>${money(gd)}</td><td>${money(tienD)}</td>
</tr>

<tr>
<td>${r.phong}</td><td>Tiền nước</td>
<td>${r.nuocCu}</td><td>${r.nuocMoi}</td>
<td>${tn}</td><td>${money(gn)}</td><td>${money(tienN)}</td>
</tr>

<tr>
<td colspan="6"><b>Tổng phòng</b></td>
<td><b>${money(tienD+tienN)}</b></td>
</tr>
`;
}

// XEM TẤT CẢ
function viewAllRooms(){
let html="";
let gd=+giaDien.value, gn=+giaNuoc.value;

rooms.forEach(r=>{
let td=r.dienMoi-r.dienCu;
let tn=r.nuocMoi-r.nuocCu;

let tienD=td*gd;
let tienN=tn*gn;
let tong=tienD+tienN;

html+=`
<tr>
<td colspan="7" style="background:#d0d0d0; font-weight:bold; text-align:left;">
PHÒNG ${r.phong} (${formatDate(r.tuNgay)} → ${formatDate(r.denNgay)})
</td>
</tr>

<tr>
<td>${r.phong}</td><td>Tiền điện</td>
<td>${r.dienCu}</td><td>${r.dienMoi}</td>
<td>${td}</td><td>${money(gd)}</td><td>${money(tienD)}</td>
</tr>

<tr>
<td>${r.phong}</td><td>Tiền nước</td>
<td>${r.nuocCu}</td><td>${r.nuocMoi}</td>
<td>${tn}</td><td>${money(gn)}</td><td>${money(tienN)}</td>
</tr>

<tr>
<td colspan="6" style="text-align:right;"><b>Tổng phòng ${r.phong}</b></td>
<td><b>${money(tong)}</b></td>
</tr>
`;
});

billTable.innerHTML=`
<tr>
<th>Phòng</th><th>Nội dung</th><th>Số cũ</th><th>Số mới</th><th>Tổng</th><th>Đơn giá</th><th>Thành tiền</th>
</tr>
${html}
`;

viewPhong.innerText="DANH SÁCH PHÒNG";
viewTu.innerText="";
viewDen.innerText="";
}

// IN + EXCEL
function printPhieu(){window.print();}
function exportExcel(){
let data=rooms.map(r=>({
Phòng:r.phong,
"Từ ngày":formatDate(r.tuNgay),
"Đến ngày":formatDate(r.denNgay),
Điện:r.dienMoi-r.dienCu,
Nước:r.nuocMoi-r.nuocCu
}));
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Data");
XLSX.writeFile(wb,"phong.xlsx");
}

// INIT
window.onload=function(){
load();
if(localStorage.getItem("loggedIn")==="true") showApp();
}
</script>

</body>
</html>
